<!DOCTYPE html>
<html>

<head>
    <title>Test Google Login Divexplore</title>
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <!-- Script resmi dari Google -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body style="padding: 50px; font-family: sans-serif;">
    <h2>Silakan Login dengan Gmail Anda</h2>

    <!-- GANTI DATA-CLIENT_ID DI BAWAH DENGAN MILIK ANDA -->
    <div id="g_id_onload" data-client_id="907559743141-sdfob8odiaeg0dmgbh35gd5bp8fdaknk.apps.googleusercontent.com"
        data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard"></div>

    <h3>Token Rahasia (Copy ini ke Postman):</h3>
    <textarea id="tokenBox" style="width:100%; height:150px;"></textarea>

    <script>
        // Fungsi ini akan dipanggil otomatis saat Anda selesai klik akun Gmail
        function handleCredentialResponse(response) {
            console.log("Token dari Google: " + response.credential);
            document.getElementById("tokenBox").value = response.credential;
        }
    </script>
</body>

</html>
